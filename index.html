<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TimeCard" />
  <meta name="theme-color" content="#0f1117" />
  <title>TimeCard</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- jsPDF for client-side PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent-in: #00e5a0;
      --accent-out:#ff5f6d;
      --accent-neu:#5b8fff;
      --accent-pdf:#f0b429;
      --text:      #e8eaf0;
      --muted:     #6b7080;
      --mono:      'Space Mono', monospace;
      --sans:      'DM Sans', sans-serif;
      --radius:    14px;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bot);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo { font-family: var(--mono); font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent-in); }

    #live-clock { font-family: var(--mono); font-size: 13px; color: var(--muted); text-align: right; }
    #live-date  { font-size: 11px; color: var(--muted); opacity: 0.7; }

    main {
      flex: 1;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.3s;
    }
    .status-card.clocked-in  { border-color: var(--accent-in); }

    .status-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0; transition: background 0.3s;
    }
    .clocked-in .status-dot { background: var(--accent-in); animation: pulse-in 2s infinite; }
    @keyframes pulse-in {
      0%   { box-shadow: 0 0 0 0 rgba(0,229,160,0.5); }
      70%  { box-shadow: 0 0 0 8px rgba(0,229,160,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,229,160,0); }
    }

    .status-info { flex: 1; }
    .status-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-family: var(--mono); }
    .status-value { font-size: 17px; font-weight: 600; margin-top: 2px; }
    .status-sub   { font-size: 12px; color: var(--muted); margin-top: 3px; font-family: var(--mono); }

    #elapsed { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--accent-in); min-width: 80px; text-align: right; }

    .punch-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn {
      padding: 18px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, opacity 0.2s;
      background: var(--surface);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-icon { font-size: 24px; }
    .btn-in  { border-color: var(--accent-in);  color: var(--accent-in);  }
    .btn-out { border-color: var(--accent-out); color: var(--accent-out); }
    .btn-in:not(:disabled):active  { box-shadow: 0 0 20px rgba(0,229,160,0.3); }
    .btn-out:not(:disabled):active { box-shadow: 0 0 20px rgba(255,95,109,0.3); }

    .note-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .note-box label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-family: var(--mono); display: block; margin-bottom: 8px; }
    .note-box input { width: 100%; background: transparent; border: none; outline: none; color: var(--text); font-family: var(--sans); font-size: 15px; caret-color: var(--accent-in); }
    .note-box input::placeholder { color: var(--muted); }

    .export-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .btn-export-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s, border-color 0.2s;
    }
    .btn-export-card:active { transform: scale(0.97); }
    .btn-export-card .ec-icon { font-size: 22px; }
    .btn-export-card.ec-csv  { border-color: var(--accent-neu); color: var(--accent-neu); }
    .btn-export-card.ec-pdf  { border-color: var(--accent-pdf); color: var(--accent-pdf); }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .section-title  { font-family: var(--mono); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

    .btn-sm {
      font-family: var(--mono); font-size: 11px; padding: 5px 10px;
      border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted); cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: color 0.2s, border-color 0.2s;
    }
    .btn-clear { color: var(--accent-out); border-color: var(--accent-out); }

    #punch-log {
      display: flex; flex-direction: column; gap: 8px;
      max-height: 380px; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }

    .punch-entry {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
      display: grid; grid-template-columns: auto 1fr auto;
      align-items: center; gap: 12px; animation: slide-in 0.2s ease;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .punch-type-badge { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-in  { background: rgba(0,229,160,0.15); color: var(--accent-in); }
    .badge-out { background: rgba(255,95,109,0.15); color: var(--accent-out); }

    .punch-details { min-width: 0; }
    .punch-time { font-family: var(--mono); font-size: 14px; font-weight: 700; }
    .punch-date { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .punch-note-text { font-size: 12px; color: var(--text); opacity: 0.75; margin-top: 3px; font-style: italic; }

    .punch-delete { background: none; border: none; color: var(--border); font-size: 18px; cursor: pointer; padding: 4px; -webkit-tap-highlight-color: transparent; line-height: 1; transition: color 0.15s; }
    .punch-delete:hover { color: var(--accent-out); }

    .empty-state { text-align: center; color: var(--muted); font-size: 14px; padding: 40px 20px; font-family: var(--mono); }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }

    #toast {
      position: fixed; bottom: calc(24px + var(--safe-bot)); left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1px solid var(--border); border-radius: 30px;
      padding: 10px 20px; font-size: 13px; font-family: var(--mono); color: var(--text);
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; white-space: nowrap; z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    #punch-log::-webkit-scrollbar { width: 4px; }
    #punch-log::-webkit-scrollbar-track { background: transparent; }
    #punch-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo">Time<span>Card</span></div>
  <div>
    <div id="live-clock">--:--:--</div>
    <div id="live-date">---</div>
  </div>
</header>

<main>

  <div class="status-card" id="status-card">
    <div class="status-dot"></div>
    <div class="status-info">
      <div class="status-label">Status</div>
      <div class="status-value" id="status-value">Not Clocked In</div>
      <div class="status-sub" id="status-sub">—</div>
    </div>
    <div id="elapsed">—</div>
  </div>

  <div class="note-box">
    <label>📝 Note (optional)</label>
    <input type="text" id="note-input" placeholder="e.g. office, remote, client visit…" maxlength="80" />
  </div>

  <div class="punch-row">
    <button class="btn btn-in"  id="btn-in"  onclick="punch('IN')">
      <span class="btn-icon">▶</span>CLOCK IN
    </button>
    <button class="btn btn-out" id="btn-out" onclick="punch('OUT')" disabled>
      <span class="btn-icon">■</span>CLOCK OUT
    </button>
  </div>

  <div class="export-row">
    <button class="btn-export-card ec-csv" onclick="exportCSV()">
      <span class="ec-icon">📊</span>EXPORT CSV
    </button>
    <button class="btn-export-card ec-pdf" onclick="exportPDF()">
      <span class="ec-icon">📋</span>DAILY REPORT
    </button>
  </div>

  <div>
    <div class="section-header">
      <div class="section-title">Punch Log</div>
      <button class="btn-sm btn-clear" onclick="clearLog()">✕ Clear All</button>
    </div>
    <div id="punch-log"></div>
  </div>

</main>

<div id="toast"></div>

<script>
const STORE_KEY = 'timecard_punches_v2';
const STATE_KEY = 'timecard_state_v2';

let punches     = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
let clockedIn   = false;
let clockInTime = null;

const savedState = JSON.parse(localStorage.getItem(STATE_KEY) || 'null');
if (savedState && savedState.clockedIn) {
  clockedIn   = true;
  clockInTime = new Date(savedState.clockInTime);
}

function pad(n) { return String(n).padStart(2, '0'); }

function fmt12(date) {
  let h = date.getHours(), m = date.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${pad(m)} ${ampm}`;
}

function fmtDateShort(date) {
  return date.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
}

function fmtDateKey(date) {
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
}

function updateClock() {
  const now = new Date();
  document.getElementById('live-clock').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('live-date').textContent =
    now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
}

function updateElapsed() {
  if (!clockedIn || !clockInTime) { document.getElementById('elapsed').textContent = '—'; return; }
  const diff = Math.floor((Date.now() - clockInTime.getTime()) / 1000);
  const h = Math.floor(diff / 3600), m = Math.floor((diff % 3600) / 60), s = diff % 60;
  document.getElementById('elapsed').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
}

setInterval(updateClock, 1000);
setInterval(updateElapsed, 1000);
updateClock();

function punch(type) {
  const now  = new Date();
  const note = document.getElementById('note-input').value.trim();
  const entry = {
    id: Date.now(), type,
    iso:       now.toISOString(),
    dateKey:   fmtDateKey(now),
    dateLabel: fmtDateShort(now),
    time12:    fmt12(now),
    note
  };
  punches.unshift(entry);
  localStorage.setItem(STORE_KEY, JSON.stringify(punches));
  if (type === 'IN') {
    clockedIn = true; clockInTime = now;
    localStorage.setItem(STATE_KEY, JSON.stringify({ clockedIn: true, clockInTime: now.toISOString() }));
  } else {
    clockedIn = false; clockInTime = null;
    localStorage.setItem(STATE_KEY, JSON.stringify({ clockedIn: false }));
  }
  document.getElementById('note-input').value = '';
  updateUI(); renderLog();
  showToast(type === 'IN' ? '✅ Clocked In' : '🛑 Clocked Out');
}

function updateUI() {
  const card   = document.getElementById('status-card');
  const val    = document.getElementById('status-value');
  const sub    = document.getElementById('status-sub');
  const btnIn  = document.getElementById('btn-in');
  const btnOut = document.getElementById('btn-out');
  if (clockedIn) {
    card.className = 'status-card clocked-in';
    val.textContent = 'Clocked In'; val.style.color = 'var(--accent-in)';
    sub.textContent = clockInTime ? `Since ${fmt12(clockInTime)}` : '';
    btnIn.disabled = true; btnOut.disabled = false;
  } else {
    card.className = 'status-card';
    val.textContent = 'Not Clocked In'; val.style.color = '';
    const lastOut = punches.find(p => p.type === 'OUT');
    sub.textContent = lastOut ? `Last out: ${lastOut.time12}  ${lastOut.dateLabel}` : '—';
    btnIn.disabled = false; btnOut.disabled = true;
  }
}

function renderLog() {
  const container = document.getElementById('punch-log');
  if (!punches.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🕐</div>No punches yet</div>`;
    return;
  }
  container.innerHTML = punches.map(p => `
    <div class="punch-entry">
      <span class="punch-type-badge ${p.type === 'IN' ? 'badge-in' : 'badge-out'}">${p.type}</span>
      <div class="punch-details">
        <div class="punch-time">${p.time12}</div>
        <div class="punch-date">${p.dateLabel}</div>
        ${p.note ? `<div class="punch-note-text">"${p.note}"</div>` : ''}
      </div>
      <button class="punch-delete" onclick="deletePunch(${p.id})">×</button>
    </div>
  `).join('');
}

function deletePunch(id) {
  punches = punches.filter(p => p.id !== id);
  localStorage.setItem(STORE_KEY, JSON.stringify(punches));
  renderLog();
  showToast('Entry deleted');
}

// ── Build daily summary (used by both CSV and PDF) ──
function buildDailySummary() {
  const days = {};
  for (const p of punches) {
    if (!days[p.dateKey]) days[p.dateKey] = { dateKey: p.dateKey, dateLabel: p.dateLabel, punches: [] };
    days[p.dateKey].punches.push(p);
  }
  const sorted = Object.values(days).sort((a, b) => b.dateKey.localeCompare(a.dateKey));
  for (const day of sorted) {
    const dp = [...day.punches].sort((a, b) => a.iso.localeCompare(b.iso));
    let totalMs = 0, pairs = [], i = 0;
    while (i < dp.length) {
      if (dp[i].type === 'IN') {
        const inP  = dp[i];
        const outP = dp[i+1]?.type === 'OUT' ? dp[i+1] : null;
        if (outP) { const ms = new Date(outP.iso) - new Date(inP.iso); totalMs += ms; pairs.push({ inP, outP, ms }); i += 2; }
        else       { pairs.push({ inP, outP: null, ms: 0 }); i += 1; }
      } else { i++; }
    }
    const totalMins = Math.round(totalMs / 60000);
    day.pairs      = pairs;
    day.totalHours = Math.floor(totalMins / 60);
    day.totalMins  = totalMins % 60;
    day.totalLabel = `${day.totalHours}h ${pad(day.totalMins)}m`;
  }
  return sorted;
}

// ── Export CSV ──
function exportCSV() {
  if (!punches.length) { showToast('No punches to export'); return; }
  const days  = buildDailySummary();
  const lines = ['Date,Day of Week,Clock In,Clock Out,Hours Worked,Note'];

  for (const day of days) {
    const d       = new Date(day.dateKey + 'T12:00:00');
    const weekday = d.toLocaleDateString('en-US', { weekday: 'long' });
    const dateFmt = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

    if (!day.pairs.length) {
      lines.push(`"${dateFmt}","${weekday}","","","",""`);
    } else {
      for (const pair of day.pairs) {
        const inTime  = pair.inP  ? pair.inP.time12  : '';
        const outTime = pair.outP ? pair.outP.time12 : 'Still In';
        const hrs     = pair.ms > 0
          ? `${Math.floor(pair.ms/3600000)}h ${pad(Math.round((pair.ms%3600000)/60000))}m` : '';
        const note    = (pair.inP?.note || pair.outP?.note || '').replace(/"/g, '""');
        lines.push(`"${dateFmt}","${weekday}","${inTime}","${outTime}","${hrs}","${note}"`);
      }
      lines.push(`"","DAILY TOTAL","","","${day.totalLabel}",""`);
      lines.push('');
    }
  }

  // Grand total row
  let grandMs = 0;
  for (const day of days) for (const p of day.pairs) grandMs += p.ms;
  const gtM = Math.round(grandMs/60000);
  lines.push(`"ALL DAYS","GRAND TOTAL","","","${Math.floor(gtM/60)}h ${pad(gtM%60)}m",""`);

  const csv  = lines.join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `timecard_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('📊 CSV exported!');
}

// ── Export PDF Daily Report ──
function exportPDF() {
  if (!punches.length) { showToast('No punches to export'); return; }
  if (typeof window.jspdf === 'undefined') { showToast('PDF library loading — try again'); return; }

  const { jsPDF } = window.jspdf;
  const doc    = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'letter' });
  const pageW  = doc.internal.pageSize.getWidth();
  const pageH  = doc.internal.pageSize.getHeight();
  const ML     = 50, MR = 50;
  const CW     = pageW - ML - MR;
  const cols   = [CW * 0.28, CW * 0.22, CW * 0.22, CW * 0.28]; // Date, In, Out, Hours

  // Palette
  const BG    = [15, 17, 23];
  const SURF  = [26, 29, 39];
  const BORD  = [55, 65, 90];
  const GREEN = [0, 200, 140];
  const WHITE = [232, 234, 240];
  const MUTED = [120, 130, 150];
  const ALT   = [22, 25, 36];
  const TOTBG = [20, 60, 45];
  const RED   = [220, 80, 90];
  const GOLD  = [240, 180, 41];

  const days = buildDailySummary();
  const genStr = new Date().toLocaleDateString('en-US', {
    month:'long', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit'
  });

  function fillBg() {
    doc.setFillColor(...BG);
    doc.rect(0, 0, pageW, pageH, 'F');
  }

  function drawPageHeader() {
    doc.setFillColor(...SURF);
    doc.rect(0, 0, pageW, 70, 'F');
    doc.setDrawColor(...GREEN);
    doc.setLineWidth(2);
    doc.line(ML, 70, pageW - MR, 70);

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(22);
    doc.setTextColor(...WHITE);
    doc.text('TIME', ML, 42);
    doc.setTextColor(...GREEN);
    doc.text('CARD', ML + 50, 42);

    doc.setFont('courier', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(...MUTED);
    doc.text(`DAILY HOURS REPORT  ·  ${genStr}`, ML, 58);
  }

  function drawTableCols(y) {
    const hdrs = ['DATE', 'CLOCK IN', 'CLOCK OUT', 'HOURS WORKED'];
    doc.setFillColor(...SURF);
    doc.rect(ML, y, CW, 20, 'F');
    doc.setFont('courier', 'bold');
    doc.setFontSize(7.5);
    doc.setTextColor(...GREEN);
    let x = ML + 8;
    hdrs.forEach((h, i) => { doc.text(h, x, y + 13); x += cols[i]; });
    return y + 20;
  }

  fillBg();
  drawPageHeader();

  let y = 88;
  const ROW_H = 30;

  function checkPage() {
    if (y > pageH - 70) {
      doc.addPage(); fillBg(); drawPageHeader(); y = 88;
    }
  }

  for (const day of days) {
    checkPage();

    // Day heading bar
    const d = new Date(day.dateKey + 'T12:00:00');
    const headStr = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

    doc.setFillColor(...SURF);
    doc.rect(ML, y, CW, 22, 'F');
    doc.setDrawColor(...BORD);
    doc.setLineWidth(0.5);
    doc.rect(ML, y, CW, 22, 'S');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.setTextColor(...WHITE);
    doc.text(headStr, ML + 10, y + 14);
    y += 22;

    y = drawTableCols(y);

    if (!day.pairs.length) {
      doc.setFillColor(...BG);
      doc.rect(ML, y, CW, ROW_H, 'F');
      doc.setFont('courier', 'normal');
      doc.setFontSize(8.5);
      doc.setTextColor(...MUTED);
      doc.text('No complete punch pairs', ML + 10, y + 18);
      y += ROW_H;
    } else {
      day.pairs.forEach((pair, pi) => {
        checkPage();
        doc.setFillColor(...(pi % 2 === 1 ? ALT : BG));
        doc.rect(ML, y, CW, ROW_H, 'F');
        doc.setDrawColor(...BORD);
        doc.setLineWidth(0.25);
        doc.line(ML, y + ROW_H, ML + CW, y + ROW_H);

        // Date (only first pair per day)
        const dateCell = pi === 0
          ? d.toLocaleDateString('en-US', { month:'short', day:'numeric' }) : '';
        const inCell   = pair.inP  ? pair.inP.time12  : '—';
        const outCell  = pair.outP ? pair.outP.time12 : '— open';
        const hrsCell  = pair.ms > 0
          ? `${Math.floor(pair.ms/3600000)}h ${pad(Math.round((pair.ms%3600000)/60000))}m` : '—';

        const cells = [dateCell, inCell, outCell, hrsCell];
        doc.setFont('courier', 'normal');
        doc.setFontSize(9.5);

        let x = ML + 8;
        cells.forEach((cell, ci) => {
          if      (ci === 2 && !pair.outP) doc.setTextColor(...RED);
          else if (ci === 3 && pair.ms > 0) doc.setTextColor(...GREEN);
          else     doc.setTextColor(...WHITE);
          doc.text(cell, x, y + 18);
          x += cols[ci];
        });

        // Note
        const note = pair.inP?.note || pair.outP?.note || '';
        if (note) {
          doc.setFont('helvetica', 'oblique');
          doc.setFontSize(7.5);
          doc.setTextColor(...MUTED);
          doc.text(`  Note: ${note}`, ML + 8, y + 27);
        }

        y += ROW_H;
      });

      // Daily total
      checkPage();
      doc.setFillColor(...TOTBG);
      doc.rect(ML, y, CW, 24, 'F');
      doc.setDrawColor(...GREEN);
      doc.setLineWidth(0.75);
      doc.rect(ML, y, CW, 24, 'S');
      doc.setFont('courier', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(...GREEN);
      doc.text('DAILY TOTAL', ML + 10, y + 15);
      const totalX = ML + cols[0] + cols[1] + cols[2] + 8;
      doc.text(day.totalLabel, totalX, y + 15);
      y += 24;
    }

    y += 16; // gap between days
  }

  // Grand total block
  checkPage();
  y += 4;
  let grandMs = 0;
  for (const day of days) for (const p of day.pairs) grandMs += p.ms;
  const gtMins = Math.round(grandMs / 60000);
  const gtH = Math.floor(gtMins / 60), gtM = gtMins % 60;

  doc.setFillColor(...SURF);
  doc.rect(ML, y, CW, 44, 'F');
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(1.5);
  doc.rect(ML, y, CW, 44, 'S');

  doc.setFont('courier', 'bold');
  doc.setFontSize(9);
  doc.setTextColor(...MUTED);
  doc.text(`GRAND TOTAL  ·  ${days.length} DAY(S)`, ML + 12, y + 16);

  doc.setFontSize(18);
  doc.setTextColor(...GOLD);
  doc.text(`${gtH}h ${pad(gtM)}m`, ML + 12, y + 36);

  // Footer on all pages
  const total = doc.internal.getNumberOfPages();
  for (let p = 1; p <= total; p++) {
    doc.setPage(p);
    doc.setFillColor(...SURF);
    doc.rect(0, pageH - 26, pageW, 26, 'F');
    doc.setFont('courier', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(...MUTED);
    doc.text('TimeCard  ·  Confidential', ML, pageH - 9);
    doc.text(`Page ${p} of ${total}`, pageW - MR - 36, pageH - 9);
  }

  doc.save(`timecard_report_${new Date().toISOString().slice(0,10)}.pdf`);
  showToast('📋 PDF report saved!');
}

function clearLog() {
  if (!punches.length) { showToast('Nothing to clear'); return; }
  if (!confirm('Delete ALL punch records?\n\nExport first if you need a backup!')) return;
  punches = []; clockedIn = false; clockInTime = null;
  localStorage.removeItem(STORE_KEY); localStorage.removeItem(STATE_KEY);
  updateUI(); renderLog(); showToast('Log cleared');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

updateUI(); renderLog(); updateElapsed();
</script>
</body>
</html>
