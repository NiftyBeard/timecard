<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TimeCard" />
  <meta name="theme-color" content="#0f1117" />
  <title>TimeCard</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Apple touch icon fallback (inline SVG as data URI) -->
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent-in: #00e5a0;
      --accent-out:#ff5f6d;
      --accent-neu:#5b8fff;
      --text:      #e8eaf0;
      --muted:     #6b7080;
      --mono:      'Space Mono', monospace;
      --sans:      'DM Sans', sans-serif;
      --radius:    14px;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bot);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo span { color: var(--accent-in); }

    #live-clock {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      text-align: right;
    }
    #live-date {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.7;
    }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Status card ── */
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.3s;
    }
    .status-card.clocked-in  { border-color: var(--accent-in);  }
    .status-card.clocked-out { border-color: var(--accent-out); }

    .status-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
      box-shadow: 0 0 0 0 transparent;
    }
    .clocked-in  .status-dot {
      background: var(--accent-in);
      animation: pulse-in 2s infinite;
    }
    .clocked-out .status-dot { background: var(--accent-out); animation: none; }

    @keyframes pulse-in {
      0%   { box-shadow: 0 0 0 0 rgba(0,229,160,0.5); }
      70%  { box-shadow: 0 0 0 8px rgba(0,229,160,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,229,160,0); }
    }

    .status-info { flex: 1; }
    .status-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      font-family: var(--mono);
    }
    .status-value {
      font-size: 17px;
      font-weight: 600;
      margin-top: 2px;
    }
    .status-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      font-family: var(--mono);
    }

    /* elapsed timer */
    #elapsed {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
      color: var(--accent-in);
      min-width: 80px;
      text-align: right;
    }

    /* ── Punch buttons ── */
    .punch-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      padding: 18px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, opacity 0.2s;
      background: var(--surface);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-icon { font-size: 24px; }

    .btn-in {
      border-color: var(--accent-in);
      color: var(--accent-in);
    }
    .btn-in:not(:disabled):active { box-shadow: 0 0 20px rgba(0,229,160,0.3); }

    .btn-out {
      border-color: var(--accent-out);
      color: var(--accent-out);
    }
    .btn-out:not(:disabled):active { box-shadow: 0 0 20px rgba(255,95,109,0.3); }

    /* ── Location note ── */
    .location-note {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .location-note label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      font-family: var(--mono);
      display: block;
      margin-bottom: 8px;
    }
    .location-note input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      caret-color: var(--accent-in);
    }
    .location-note input::placeholder { color: var(--muted); }

    /* ── Log section ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .section-title {
      font-family: var(--mono);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .btn-sm {
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-sm:hover { color: var(--text); border-color: var(--muted); }

    .btn-export {
      color: var(--accent-neu);
      border-color: var(--accent-neu);
    }
    .btn-clear {
      color: var(--accent-out);
      border-color: var(--accent-out);
    }

    .btn-row { display: flex; gap: 8px; }

    /* ── Punch log ── */
    #punch-log {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 380px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .punch-entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      animation: slide-in 0.2s ease;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .punch-type-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-in  { background: rgba(0,229,160,0.15); color: var(--accent-in); }
    .badge-out { background: rgba(255,95,109,0.15); color: var(--accent-out); }

    .punch-details { min-width: 0; }
    .punch-time {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
    }
    .punch-date {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }
    .punch-loc {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .punch-note-text {
      font-size: 12px;
      color: var(--text);
      opacity: 0.75;
      margin-top: 3px;
      font-style: italic;
    }

    .punch-delete {
      background: none;
      border: none;
      color: var(--border);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
      transition: color 0.15s;
    }
    .punch-delete:hover { color: var(--accent-out); }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 40px 20px;
      font-family: var(--mono);
    }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: calc(24px + var(--safe-bot));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 10px 20px;
      font-size: 13px;
      font-family: var(--mono);
      color: var(--text);
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Geo status bar ── */
    #geo-bar {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      text-align: center;
      padding: 6px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    /* ── Scrollbar ── */
    #punch-log::-webkit-scrollbar { width: 4px; }
    #punch-log::-webkit-scrollbar-track { background: transparent; }
    #punch-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo">Time<span>Card</span></div>
  <div>
    <div id="live-clock">--:--:--</div>
    <div id="live-date">---</div>
  </div>
</header>

<main>

  <!-- Status -->
  <div class="status-card" id="status-card">
    <div class="status-dot"></div>
    <div class="status-info">
      <div class="status-label">Status</div>
      <div class="status-value" id="status-value">Not Clocked In</div>
      <div class="status-sub" id="status-sub">—</div>
    </div>
    <div id="elapsed">—</div>
  </div>

  <!-- Optional note -->
  <div class="location-note">
    <label>📝 Note (optional)</label>
    <input type="text" id="note-input" placeholder="e.g. Client site, office, remote…" maxlength="80" />
  </div>

  <!-- Punch buttons -->
  <div class="punch-row">
    <button class="btn btn-in" id="btn-in" onclick="punch('IN')">
      <span class="btn-icon">▶</span>
      CLOCK IN
    </button>
    <button class="btn btn-out" id="btn-out" onclick="punch('OUT')" disabled>
      <span class="btn-icon">■</span>
      CLOCK OUT
    </button>
  </div>

  <!-- Log -->
  <div>
    <div class="section-header">
      <div class="section-title">Punch Log</div>
      <div class="btn-row">
        <button class="btn-sm btn-export" onclick="exportCSV()">⬇ Export CSV</button>
        <button class="btn-sm btn-clear" onclick="clearLog()">✕ Clear</button>
      </div>
    </div>
    <div id="punch-log"></div>
  </div>

</main>

<div id="geo-bar">📍 Location: waiting for permission…</div>
<div id="toast"></div>

<script>
// ── Storage keys ──
const STORE_KEY    = 'timecard_punches';
const STATE_KEY    = 'timecard_state';

// ── State ──
let punches        = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
let clockedIn      = false;
let clockInTime    = null;
let elapsedTimer   = null;
let lastPosition   = null;
let geoWatchId     = null;

// ── Restore persisted state ──
const savedState = JSON.parse(localStorage.getItem(STATE_KEY) || 'null');
if (savedState && savedState.clockedIn) {
  clockedIn   = true;
  clockInTime = new Date(savedState.clockInTime);
}

// ── Clock ──
function pad(n) { return String(n).padStart(2, '0'); }

function updateClock() {
  const now = new Date();
  document.getElementById('live-clock').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('live-date').textContent =
    now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
}

function updateElapsed() {
  if (!clockedIn || !clockInTime) {
    document.getElementById('elapsed').textContent = '—';
    return;
  }
  const diff = Math.floor((Date.now() - clockInTime.getTime()) / 1000);
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  const s = diff % 60;
  document.getElementById('elapsed').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
}

setInterval(updateClock, 1000);
setInterval(updateElapsed, 1000);
updateClock();

// ── Geolocation ──
function startGeo() {
  if (!navigator.geolocation) {
    document.getElementById('geo-bar').textContent = '📍 Geolocation not supported';
    return;
  }
  geoWatchId = navigator.geolocation.watchPosition(
    pos => {
      lastPosition = pos;
      const { latitude: lat, longitude: lon, accuracy } = pos.coords;
      document.getElementById('geo-bar').textContent =
        `📍 ${lat.toFixed(5)}, ${lon.toFixed(5)}  ±${Math.round(accuracy)}m`;
    },
    err => {
      document.getElementById('geo-bar').textContent =
        `📍 Location unavailable (${err.message})`;
    },
    { enableHighAccuracy: true, maximumAge: 10000 }
  );
}
startGeo();

// ── Punch ──
async function punch(type) {
  const now      = new Date();
  const note     = document.getElementById('note-input').value.trim();

  let lat = null, lon = null, accuracy = null, geoLabel = 'unavailable';
  if (lastPosition) {
    lat      = lastPosition.coords.latitude;
    lon      = lastPosition.coords.longitude;
    accuracy = Math.round(lastPosition.coords.accuracy);
    geoLabel = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
  }

  const entry = {
    id:        Date.now(),
    type,
    timestamp: now.toISOString(),
    date:      now.toLocaleDateString('en-US', { weekday:'short', year:'numeric', month:'short', day:'numeric' }),
    time:      `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`,
    lat, lon, accuracy,
    geoLabel,
    note
  };

  punches.unshift(entry);
  localStorage.setItem(STORE_KEY, JSON.stringify(punches));

  if (type === 'IN') {
    clockedIn   = true;
    clockInTime = now;
    localStorage.setItem(STATE_KEY, JSON.stringify({ clockedIn: true, clockInTime: now.toISOString() }));
  } else {
    clockedIn   = false;
    clockInTime = null;
    localStorage.setItem(STATE_KEY, JSON.stringify({ clockedIn: false }));
  }

  document.getElementById('note-input').value = '';
  updateUI();
  renderLog();
  showToast(type === 'IN' ? '✅ Clocked In' : '🛑 Clocked Out');
}

// ── UI state ──
function updateUI() {
  const card  = document.getElementById('status-card');
  const val   = document.getElementById('status-value');
  const sub   = document.getElementById('status-sub');
  const btnIn  = document.getElementById('btn-in');
  const btnOut = document.getElementById('btn-out');

  if (clockedIn) {
    card.className = 'status-card clocked-in';
    val.textContent = 'Clocked In';
    val.style.color = 'var(--accent-in)';
    sub.textContent = clockInTime
      ? `Since ${pad(clockInTime.getHours())}:${pad(clockInTime.getMinutes())}`
      : '';
    btnIn.disabled  = true;
    btnOut.disabled = false;
  } else {
    card.className = 'status-card';
    val.textContent = 'Not Clocked In';
    val.style.color = '';
    if (punches.length) {
      const last = punches.find(p => p.type === 'OUT');
      sub.textContent = last ? `Last out: ${last.time} ${last.date}` : '—';
    } else {
      sub.textContent = '—';
    }
    btnIn.disabled  = false;
    btnOut.disabled = true;
  }
}

// ── Render log ──
function renderLog() {
  const container = document.getElementById('punch-log');
  if (!punches.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🕐</div>No punches yet</div>`;
    return;
  }
  container.innerHTML = punches.map(p => `
    <div class="punch-entry">
      <span class="punch-type-badge ${p.type === 'IN' ? 'badge-in' : 'badge-out'}">${p.type}</span>
      <div class="punch-details">
        <div class="punch-time">${p.time}</div>
        <div class="punch-date">${p.date}</div>
        <div class="punch-loc">📍 ${p.geoLabel}${p.accuracy ? ' ±'+p.accuracy+'m' : ''}</div>
        ${p.note ? `<div class="punch-note-text">"${p.note}"</div>` : ''}
      </div>
      <button class="punch-delete" onclick="deletePunch(${p.id})" title="Delete">×</button>
    </div>
  `).join('');
}

// ── Delete single entry ──
function deletePunch(id) {
  punches = punches.filter(p => p.id !== id);
  localStorage.setItem(STORE_KEY, JSON.stringify(punches));
  renderLog();
  showToast('Entry deleted');
}

// ── Export CSV ──
function exportCSV() {
  if (!punches.length) { showToast('No punches to export'); return; }

  const header = ['Type', 'Date', 'Time', 'Latitude', 'Longitude', 'Accuracy (m)', 'Note', 'ISO Timestamp'];
  const rows   = punches.map(p => [
    p.type, p.date, p.time,
    p.lat ?? '', p.lon ?? '', p.accuracy ?? '',
    `"${(p.note || '').replace(/"/g, '""')}"`,
    p.timestamp
  ]);

  const csv = [header, ...rows].map(r => r.join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `timecard_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('📄 CSV exported!');
}

// ── Clear all ──
function clearLog() {
  if (!punches.length) { showToast('Nothing to clear'); return; }
  if (!confirm('Delete ALL punch records? This cannot be undone.\n\nExport first if you want a backup!')) return;
  punches = [];
  clockedIn   = false;
  clockInTime = null;
  localStorage.removeItem(STORE_KEY);
  localStorage.removeItem(STATE_KEY);
  updateUI();
  renderLog();
  showToast('Log cleared');
}

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Service Worker registration ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── Init ──
updateUI();
renderLog();
updateElapsed();
</script>
</body>
</html>
